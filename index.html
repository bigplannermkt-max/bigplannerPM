<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>빅플래너 PM 수수료 산정</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="페이지 상단">
        <div>
          <p class="eyebrow">Bigplanner Partners</p>
          <h1>PM 수수료 산정</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="resetProject" type="button">초기화</button>
        </div>
      </section>

      <section class="summary-grid" aria-label="견적 요약">
        <article class="summary-tile">
          <span>기본 PM비</span>
          <strong id="stickyBaseAmount">0원</strong>
        </article>
        <article class="summary-tile">
          <span>사업비 연동</span>
          <strong id="stickyLinkedAmount">0원</strong>
        </article>
        <article class="summary-tile">
          <span>옵션·가산</span>
          <strong id="stickyOptionAmount">0원</strong>
        </article>
        <article class="summary-tile accent">
          <span>제안금액</span>
          <strong id="stickyGrandAmount">0원</strong>
        </article>
      </section>

      <section class="reference-section" aria-label="산정 기준">
        <div class="section-head">
          <h2>산정 기준</h2>
        </div>
        <div class="reference-list">
          <article>
            <strong>기본 산식</strong>
            <p>기본 PM비 + 사업비 연동 보수 + 참여강도 가산 + 옵션업무비 + 성과보수 + 실비 + VAT</p>
          </article>
          <article>
            <strong>관리대상 사업비</strong>
            <p>건축 PM은 토지비·금융비·매각가를 제외하고 설계, 인허가, 철거, 시공, 인테리어, 부담금, 예비비 중심으로 산정합니다.</p>
          </article>
          <article>
            <strong>최소 수수료</strong>
            <p>전 과정 PM은 소규모 프로젝트라도 2,500만~3,000만원을 하한선으로 둡니다.</p>
          </article>
        </div>
      </section>

      <section class="project-area" aria-label="프로젝트 수수료 산정">
        <div class="table-shell">
          <div class="table-header">
            <h2>프로젝트 견적</h2>
            <label class="switch">
              <input id="includeVat" type="checkbox" checked />
              <span>VAT 포함 표시</span>
            </label>
          </div>
          <div id="projectRoot"></div>
        </div>
      </section>

    </main>

    <template id="projectTemplate">
      <article class="project-card">
        <div class="project-card__top project-card__top--single">
          <div class="project-title-group">
            <label>
              <span>프로젝트명</span>
              <input class="project-name" type="text" value="프로젝트 1" />
            </label>
          </div>
        </div>

        <div class="form-grid">
          <label class="visually-hidden">
            <span>패키지</span>
            <select class="package-select"></select>
          </label>
          <label class="cost-field">
            <span>관리대상 사업비</span>
            <div class="cost-control">
              <input class="managed-cost" type="hidden" />
              <div class="cost-summary">
                <div>
                  <small>PM 수수료 산정 기준</small>
                  <strong class="cost-readable">0원</strong>
                </div>
                <div>
                  <small>제외 참고 사업비</small>
                  <strong class="excluded-readable">0원</strong>
                </div>
                <div>
                  <small>전체 개발비 참고</small>
                  <strong class="development-readable">0원</strong>
                </div>
              </div>
              <div class="cost-breakdown">
                <section>
                  <h3>포함 사업비</h3>
                  <p>기획서 기준 건축 PM 수수료 산정에 반영합니다.</p>
                  <div class="cost-component-grid">
                    <label>
                      <span>설계비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="design" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>감리비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="supervision" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>인허가비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="permit" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>철거비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="demolition" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>시공비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="construction" type="number" min="0" step="10000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>인테리어 공사비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="interior" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>각종 부담금</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="charges" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>예비비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="included" data-cost-key="contingency" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                  </div>
                </section>
                <section class="cost-excluded">
                  <h3>제외 또는 별도 참고</h3>
                  <p>토지비·취득세·금융비·매각가는 기본 건축 PM 요율에 넣지 않습니다.</p>
                  <div class="cost-component-grid">
                    <label>
                      <span>토지비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="excluded" data-cost-key="land" type="number" min="0" step="10000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>취득세</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="excluded" data-cost-key="tax" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>금융비</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="excluded" data-cost-key="finance" type="number" min="0" step="1000000" />
                        <em>원</em>
                      </div>
                    </label>
                    <label>
                      <span>매각가</span>
                      <div class="money-input">
                        <input class="cost-component" data-cost-kind="excluded" data-cost-key="sale" type="number" min="0" step="10000000" />
                        <em>원</em>
                      </div>
                    </label>
                  </div>
                </section>
              </div>
            </div>
          </label>
          <label>
            <span>기간</span>
            <div class="unit-input">
              <input class="duration-months" type="number" min="1" max="60" step="1" />
              <em>개월</em>
            </div>
          </label>
        </div>

        <div class="diagnosis-block">
          <div class="option-block__head">
            <strong>프로젝트 진단</strong>
            <span>답변 기준으로 패키지와 보강 옵션 추천</span>
          </div>
          <div class="diagnosis-grid">
            <section class="diagnosis-group" data-diagnosis-group="experience">
              <h3>건축주 경험</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="experience" data-value="experienced">
                  <strong>경험 있음</strong>
                  <span>설계·시공 의사결정 경험이 있어 핵심 검토 중심으로 충분합니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="experience" data-value="some">
                  <strong>일부 경험</strong>
                  <span>문서 검토와 계약조건 체크를 보강하면 안정적입니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="experience" data-value="first">
                  <strong>처음 진행</strong>
                  <span>설계·견적·계약·현장 이슈를 넓게 관리하는 편이 안전합니다.</span>
                </button>
              </div>
            </section>
            <section class="diagnosis-group" data-diagnosis-group="purpose">
              <h3>사업 목적</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="purpose" data-value="own">
                  <strong>실사용 건물</strong>
                  <span>품질, 일정, 예산 균형을 중심으로 PM 범위를 잡습니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="purpose" data-value="rental">
                  <strong>임대 수익형</strong>
                  <span>임대 조건, 운영 준비, 수익성 검토를 함께 고려합니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="purpose" data-value="sale">
                  <strong>임대 후 매각</strong>
                  <span>PF, 임대, 매각자료 준비까지 개발 PM 성격이 강해집니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="purpose" data-value="precheck">
                  <strong>매입 전 검토</strong>
                  <span>본 PM 전 빠른 법규·예산·사업성 진단이 우선입니다.</span>
                </button>
              </div>
            </section>
            <section class="diagnosis-group" data-diagnosis-group="stage">
              <h3>현재 단계</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="stage" data-value="planning">
                  <strong>기획 전/초기</strong>
                  <span>목표, 범위, 예산 프레임과 마스터 일정을 잡는 단계입니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="stage" data-value="design">
                  <strong>설계 진행 중</strong>
                  <span>설계 예산 적합성, 변경관리, 인허가 일정 관리가 중요합니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="stage" data-value="bid">
                  <strong>견적·시공사 선정</strong>
                  <span>견적 비교, 입찰 패키지, 계약조건 검토가 핵심입니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="stage" data-value="construction">
                  <strong>공사 진행 중</strong>
                  <span>공정, 기성, 변경, 품질 이슈를 빠르게 관리해야 합니다.</span>
                </button>
              </div>
            </section>
            <section class="diagnosis-group" data-diagnosis-group="risk">
              <h3>리스크 수준</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="risk" data-value="low">
                  <strong>낮음</strong>
                  <span>설계자와 시공사가 안정적이고 이슈 가능성이 낮습니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="risk" data-value="medium">
                  <strong>보통</strong>
                  <span>예산·계약·일정 관리를 정기적으로 확인하는 편이 좋습니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="risk" data-value="high">
                  <strong>높음</strong>
                  <span>공사비, 민원, 시공사 신뢰도, 인허가 난도가 걱정됩니다.</span>
                </button>
              </div>
            </section>
            <section class="diagnosis-group" data-diagnosis-group="finance">
              <h3>금융 필요</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="finance" data-value="no">
                  <strong>필요 없음</strong>
                  <span>일반 건축 PM 범위 안에서 비용·일정 관리를 봅니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="finance" data-value="yes">
                  <strong>PF/대출 대응 필요</strong>
                  <span>금융기관 자료, 기성, 수지표 대응을 별도로 봐야 합니다.</span>
                </button>
              </div>
            </section>
            <section class="diagnosis-group" data-diagnosis-group="site">
              <h3>현장 관여</h3>
              <div class="diagnosis-card-list">
                <button class="diagnosis-choice is-selected" type="button" data-diagnosis="site" data-value="normal">
                  <strong>월 2~4회</strong>
                  <span>일반 관리형 수준의 정기회의와 현장점검이 적합합니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="site" data-value="weekly">
                  <strong>주 1회 이상</strong>
                  <span>공정·기성·변경관리를 더 자주 확인해야 합니다.</span>
                </button>
                <button class="diagnosis-choice" type="button" data-diagnosis="site" data-value="semi">
                  <strong>주 2~3회 이상</strong>
                  <span>준상주 관리에 가까워 별도 월정액 검토가 필요합니다.</span>
                </button>
              </div>
            </section>
          </div>
          <div class="diagnosis-result">
            <strong class="diagnosis-package">추천 패키지: 일반 관리형</strong>
            <p class="diagnosis-reason">프로젝트 조건을 선택하면 추천 사유가 표시됩니다.</p>
            <button class="ghost-button apply-diagnosis" type="button">추천 적용</button>
          </div>
        </div>

        <div class="package-picker">
          <div class="option-block__head">
            <strong>패키지 선택</strong>
            <span>프로젝트 성격에 맞는 범위를 선택</span>
          </div>
          <div class="package-card-grid"></div>
        </div>

        <div class="pm-task-block">
          <div class="option-block__head">
            <strong>기본 PM 업무 리스트</strong>
            <span>선택한 패키지에 포함되는 세부 관리 업무</span>
          </div>
          <div class="pm-task-grid"></div>
        </div>

        <div class="option-block">
          <div class="option-block__head">
            <strong>옵션업무</strong>
            <span>빠진 기본업무 보강 + 특수업무 선택</span>
          </div>
          <div class="option-grid"></div>
        </div>

        <div class="adjustment-grid">
          <label>
            <span>성과보수</span>
            <div class="money-input">
              <input class="success-fee" type="number" min="0" step="1000000" value="0" />
              <em>원</em>
            </div>
          </label>
          <label>
            <span>실비</span>
            <div class="money-input">
              <input class="expense-fee" type="number" min="0" step="100000" value="0" />
              <em>원</em>
            </div>
          </label>
          <label>
            <span>직접 조정</span>
            <div class="money-input">
              <input class="manual-adjustment" type="number" step="100000" value="0" />
              <em>원</em>
            </div>
          </label>
        </div>

        <div class="result-grid">
          <div>
            <span>기본 PM비</span>
            <strong class="base-fee">0원</strong>
          </div>
          <div>
            <span>사업비 연동</span>
            <strong class="linked-fee">0원</strong>
          </div>
          <div>
            <span>옵션·가산</span>
            <strong class="option-fee">0원</strong>
          </div>
          <div class="total-result">
            <span>제안금액</span>
            <strong class="project-total">0원</strong>
          </div>
        </div>
        <p class="calculation-note"></p>

        <div class="proposal-block">
          <div class="option-block__head">
            <strong>제안·업무범위·계약 문서</strong>
            <div class="inline-actions">
              <button class="ghost-button proposal-generate" type="button">제안서 작성</button>
              <button class="ghost-button scope-generate" type="button">업무범위표 작성</button>
              <button class="ghost-button contract-generate" type="button">계약서 작성</button>
            </div>
          </div>
          <textarea class="document-draft" readonly placeholder="패키지와 옵션을 선택한 뒤 필요한 문서 작성 버튼을 눌러주세요."></textarea>
        </div>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
